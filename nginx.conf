server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Cabeceras de seguridad globales ───────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-Frame-Options         "DENY"               always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Flutter Web: SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── CORS Preflight ─────────────────────────────────────────────────────
    # Flutter Web envía un OPTIONS preflight antes de cada request con
    # el header Authorization. Nginx lo responde directamente sin proxear
    # a Django — evita el error "XMLHttpRequest onError" cuando el backend
    # tarda en arrancar y el primer preflight falla con 502.
    location ~* ^/api/.*$ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'authorization,content-type,accept,origin,x-requested-with,x-csrftoken' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        client_max_body_size 55M;

        proxy_pass         http://backend:8000$request_uri;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        add_header         Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # Bloque exacto /api/ para compatibilidad con nginx location matching
    location /api/ {
        client_max_body_size 55M;

        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        add_header         Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy WebSocket → backend:8000 ────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              backend;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        proxy_read_timeout 86400;
        proxy_connect_timeout 10s;
    }

    # ── Proxy Django Admin ────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend:8000/admin/;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
    }

    # ── Archivos estáticos de Django (Admin CSS/JS) ────────────────────────
    # Requiere que el volumen static_data esté montado en /app/staticfiles
    # y que entrypoint.sh haya corrido collectstatic.
    location /static/ {
        alias   /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Archivos de media (PDFs, evidencias, documentos subidos) ──────────
    # SEGURIDAD: Los archivos de /media/ contienen documentos auditados,
    # evidencias y certificados. Se dividen en:
    #   /media/certificados/  → acceso público (verificación de certificados)
    #   resto de /media/      → proxy a Django para validar JWT antes de servir
    #
    # Para servir el resto con auth, el backend debe implementar un endpoint
    # tipo /api/media/<path> que verifique el token y devuelva X-Accel-Redirect.
    # Mientras tanto, bloqueamos el acceso directo a rutas sensibles.

    location /media/certificados/ {
        alias   /app/media/certificados/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Archivos temporales de análisis: nunca públicos
    location /media/analisis_temp/ {
        deny all;
        return 403;
    }

    # Formularios temporales del bot: nunca públicos
    location /media/formularios_tmp/ {
        deny all;
        return 403;
    }

    # Resto de media (evidencias, documentos de expediente, reportes):
    # proxy al backend para validación de autenticación
    location /media/ {
        proxy_pass         http://backend:8000/media/;
        proxy_set_header   Host              backend;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        add_header         X-Content-Type-Options "nosniff" always;
    }

    # ── Assets estáticos de Flutter (cache agresivo) ──────────────────────
    location ~* \.(js|css|wasm|ico|png|jpg|svg|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

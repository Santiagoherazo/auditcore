server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Flutter Web: SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API REST → backend:8000 ─────────────────────────────────────
    # Flutter apunta a /api/ desde el mismo origen (:3000); Nginx lo redirige
    # internamente al backend. Host forzado a "backend" para que Django no
    # rechace el request con 400 (ALLOWED_HOSTS no incluye "localhost:3000").
    #
    # FIX CRÍTICO: proxy_set_header Authorization $http_authorization
    # Sin esta línea, Nginx descarta el header Authorization del cliente,
    # por lo que todos los requests llegan a Django sin token → 401.
    # Nginx no reenvía headers del cliente a menos que se indique explícitamente
    # cuando se usa proxy_set_header para otros headers en el mismo bloque.
    location /api/ {
        # FIX: client_max_body_size — Nginx por defecto limita el body a 1MB.
        # Sin esta línea cualquier upload > 1MB devuelve 413 Request Entity Too Large
        # antes de llegar a Django. Se sube a 55MB para cubrir el límite de 50MB
        # del endpoint de análisis de documentos con margen para headers/multipart.
        client_max_body_size 55M;

        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # FIX: pasar Authorization explícitamente — Nginx lo descarta cuando
        # se usan otros proxy_set_header en el mismo bloque.
        proxy_set_header   Authorization     $http_authorization;
        # FIX: pasar Content-Type explícitamente para requests JSON y multipart.
        proxy_set_header   Content-Type      $http_content_type;
        # FIX: no cachear respuestas de la API — evita que una respuesta 401
        # sin token quede cacheada y se sirva para requests posteriores con token.
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        add_header         Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy WebSocket → backend:8000 ────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              backend;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        proxy_read_timeout 86400;
        proxy_connect_timeout 10s;
    }

    # ── Proxy Django Admin ────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend:8000/admin/;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
    }

    # ── Archivos estáticos de Django (Admin CSS/JS) ────────────────────────
    # Requiere que el volumen static_data esté montado en /app/staticfiles
    # y que entrypoint.sh haya corrido collectstatic.
    location /static/ {
        alias   /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Archivos de media (PDFs, evidencias, documentos subidos) ──────────
    # Requiere que el volumen media_data esté montado en /app/media.
    location /media/ {
        alias   /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Assets estáticos de Flutter (cache agresivo) ──────────────────────
    location ~* \.(js|css|wasm|ico|png|jpg|svg|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

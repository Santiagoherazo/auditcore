<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto">
<div style="background:#0F2447;color:white;padding:20px;text-align:center">
  <h2>🔴 AuditCore — Hallazgo CRÍTICO</h2>
</div>
<div style="padding:24px">
  <p>Se registró un hallazgo de criticidad <strong>CRÍTICA</strong> que requiere atención inmediata.</p>
  <table style="width:100%;border-collapse:collapse">
    <tr><td style="padding:8px;background:#F1F5F9"><strong>Expediente</strong></td><td style="padding:8px">{{ expediente }}</td></tr>
    <tr><td style="padding:8px;background:#F1F5F9"><strong>Cliente</strong></td><td style="padding:8px">{{ cliente }}</td></tr>
    <tr><td style="padding:8px;background:#F1F5F9"><strong>Hallazgo</strong></td><td style="padding:8px">{{ titulo }}</td></tr>
  </table>
  <p><a href="{{ url }}" style="background:#1A56DB;color:white;padding:10px 20px;border-radius:6px;text-decoration:none">Ver expediente</a></p>
</div>
</body></html>
